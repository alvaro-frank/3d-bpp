version: '3.8'

services:
  bpp-trainer:
    build: .
    image: 3d-bpp-trainer:v1
    container_name: 3d-bpp-training-env
    volumes:
      - .:/app
    environment:
      - ENV=development
      - PYTHONPATH=/app/src
      - MLFLOW_TRACKING_URI=file:/app/mlruns
      - CUDA_VISIBLE_DEVICES=""
    stdin_open: true
    tty: true
    restart: "no"
    command: tail -f /dev/null
    
    # Use GPU NVIDIA from server (Descomentar se usares GPU)
